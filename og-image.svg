<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0f1923"/>
  <rect x="0" y="0" width="1200" height="4" fill="#c8a862"/>
  <!-- Subtle glow -->
  <circle cx="200" cy="300" r="300" fill="#c8a862" opacity="0.04"/>
  <circle cx="1000" cy="400" r="250" fill="#7a9a82" opacity="0.03"/>
  <!-- Badge -->
  <rect x="460" y="140" width="280" height="36" rx="18" fill="none" stroke="#c8a862" stroke-width="1" opacity="0.5"/>
  <text x="600" y="163" font-family="Georgia, serif" font-size="13" fill="#c8a862" text-anchor="middle" letter-spacing="3" opacity="0.8">IN LOVING MEMORY</text>
  <!-- Name -->
  <text x="600" y="250" font-family="Georgia, serif" font-size="36" fill="#ffffff" text-anchor="middle" opacity="0.7">Richard L.</text>
  <text x="600" y="330" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#ffffff" text-anchor="middle">Rosenbaum</text>
  <!-- Meta -->
  <text x="600" y="385" font-family="Arial, sans-serif" font-size="16" fill="#ffffff" text-anchor="middle" opacity="0.4" letter-spacing="2">1958 — 2026</text>
  <!-- Subtitle -->
  <text x="600" y="440" font-family="Georgia, serif" font-size="18" fill="#ffffff" text-anchor="middle" opacity="0.45" font-style="italic">Criminal Defense Attorney · Fort Lauderdale, Florida</text>
  <!-- Bottom line -->
  <line x1="550" y1="480" x2="650" y2="480" stroke="#c8a862" stroke-width="1" opacity="0.3"/>
  <!-- URL -->
  <text x="600" y="540" font-family="monospace" font-size="14" fill="#c8a862" text-anchor="middle" opacity="0.5" letter-spacing="1">rlrosenbaum.com</text>
</svg>
